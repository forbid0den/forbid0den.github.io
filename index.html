.logo-link{

    right:12vw;

<script src="https://cdn.jsdelivr.net/npm/counterapi/dist/counter.browser.min.js"></script>
<script>
document.addEventListener("DOMContentLoaded", function () {
  const el = document.getElementById("count");

  const counter = new Counter({
    version: "v1",
    namespace: "0den-neocities",
    timeout: 8000,
    debug: true
  });

  counter.up("visits")
    .then(result => {
      console.log("counter result:", result);

      const value = result?.value ?? result?.count;

      if (value === undefined || value === null) {
        el.textContent = "ERROR";
        return;
      }

      el.textContent = String(value).padStart(6, "0");
    })
    .catch(err => {
      console.error("Counter error:", err);
      el.textContent = "ERROR";
    });
});
</script>
