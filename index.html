<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="format-detection" content="telephone=no,address=no,email=no">
<title>forbid0den</title>

<style>
html,body{
  margin:0;
  height:100%;
  background:#fff;
}

body{
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
}

a{
  text-decoration:none;
}

.logo-link{
  display:block;
  -webkit-tap-highlight-color:transparent;
  touch-action:manipulation;
}

.logo{
  width:80vw;
  max-width:900px;
  height:auto;
  display:block;
  cursor:pointer;
  transition:transform .12s ease, opacity .12s ease, filter .12s ease;
  transform-origin:center center;
}

.logo:hover{
  transform:scale(1.02);
}

/* JSで付く押下中クラス */
.logo-link.is-pressed .logo{
  transform:scale(.92);
  opacity:.95;
}

/* tablet */
@media (max-width:900px){
  .logo{
    width:90vw;
  }
}

/* smartphone */
@media (max-width:600px){
  .logo{
    width:125vw;
    max-width:none;
  }

  .logo:hover{
    transform:none;
  }

  .logo-link.is-pressed .logo{
    transform:scale(.94);
  }
}

/* landscape phone */
@media (orientation:landscape) and (max-height:500px){
  .logo{
    width:65vw;
    max-width:none;
  }

  .logo:hover{
    transform:none;
  }

  .logo-link.is-pressed .logo{
    transform:scale(.96);
  }
}

.counter{
  position:fixed;
  left:50%;
  bottom:84px;
  transform:translateX(-50%);
  width:min(88vw, 980px);
  text-align:center;
  font-family:"Apple Garamond","Garamond","Times New Roman",serif;
  font-size:15px;
  line-height:1.2;
  letter-spacing:0;
  color:#000;
  z-index:20;
  pointer-events:none;
}

.counter-text{
  display:block;
  color:#000 !important;
  text-decoration:none !important;
  -webkit-text-fill-color:#000 !important;
  word-break:normal;
  overflow-wrap:normal;
}

.counter a{
  color:#000 !important;
  text-decoration:none !important;
  pointer-events:none;
}

@media (max-width:600px){
  .counter{
    bottom:96px;
    width:94vw;
    font-size:13px;
    line-height:1.14;
  }
}

@media (orientation:landscape) and (max-height:500px){
  .counter{
    left:auto;
    right:22px;
    bottom:18px;
    transform:none;
    width:min(58vw, 520px);
    text-align:right;
    font-size:12px;
    line-height:1.14;
  }
}
</style>
</head>

<body>

<a href="https://0den.neocities.org/forbid0den" class="logo-link" id="logoLink">
  <img src="https://0den.neocities.org/logo.gif" alt="forbid0den logo" class="logo">
</a>

<div class="counter">
  <span id="count">Loading...</span>
	<div class="title">forbid0den</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/counterapi/dist/counter.browser.min.js"></script>
<script>
document.addEventListener("DOMContentLoaded", function () {
  const el = document.getElementById("count");

  const counter = new Counter({
    version: "v1",
    namespace: "0den-neocities",
    timeout: 8000,
    debug: true
  });

  counter.up("visits")
    .then(result => {
      console.log("counter result:", result);

      const value = result?.value ?? result?.count;

      if (value === undefined || value === null) {
        el.textContent = "ERROR";
        return;
      }

      el.textContent = String(value).padStart(6, "0");
    })
    .catch(err => {
      console.error("Counter error:", err);
      el.textContent = "ERROR";
    });
});
</script>

</body>
</html>
