<style>
html, body{
  margin:0;
  height:100%;
  background:#ffffff;
}

body{
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
}

.logo{
  width:70vw;
  max-width:900px;
  height:auto;
  display:block;
  transform-origin:center center;
}

/* tablet */
@media (max-width:900px){
  .logo{
    width:90vw;
  }
}

/* smartphone portrait */
@media (max-width:600px) and (orientation: portrait){
  .logo{
    width:105vw;
    transform:scale(1.08);
  }
}

/* iPhone 13 Pro portrait など */
@media (max-width:400px) and (orientation: portrait){
  .logo{
    width:112vw;
    transform:scale(1.12);
  }
}

/* landscape phone */ @media (orientation: landscape) and (max-height:500px){ .logo{ width:65vw; transform:none; } }

.logo{
  cursor:pointer;
  transition:transform 0.15s ease;
}

.logo:hover{
  transform:scale(1.03);
}

.logo:active{
  transform:scale(.97);
  opacity:.9;
}

.logo-link{
  text-decoration:none;
}

/* counter */

.counter{
  position:fixed;
  bottom:120px;
  left:50%;
  transform:translateX(-50%);
  text-align:center;
  font-family:"Apple Garamond","Garamond","Times New Roman",serif;
  font-size:16px;
  letter-spacing:.08em;
  color:#000;
  z-index:10;
  white-space:nowrap;
}

@media (orientation: landscape) and (max-height:500px){
  .counter{
    left:auto;
    right:12vw;
    bottom:12vh;
    transform:none;
  }
}

.counter {
  font-family: "Apple Garamond","Garamond","Times New Roman",serif;
  text-align: center;
}

.title {
  margin-bottom: 4px;     /* カウンターとの間隔 */
}

</style>

<div class="counter">
	<div class="title">forbid0den</div>
  <span id="count">Loading...</span>
</div>

<script src="https://cdn.jsdelivr.net/npm/counterapi/dist/counter.browser.min.js"></script>
<script>
document.addEventListener("DOMContentLoaded", function () {
  const el = document.getElementById("count");

  const counter = new Counter({
    version: "v1",
    namespace: "0den-neocities",
    timeout: 8000,
    debug: true
  });

  counter.up("visits")
    .then(result => {
      console.log("counter result:", result);

      const value = result?.value ?? result?.count;

      if (value === undefined || value === null) {
        el.textContent = "ERROR";
        return;
      }

      el.textContent = String(value).padStart(6, "0");
    })
    .catch(err => {
      console.error("Counter error:", err);
      el.textContent = "ERROR";
    });
});
</script>
