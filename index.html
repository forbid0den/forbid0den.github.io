<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>forbid0den</title>

<style>
html, body{
  margin:0;
  height:100%;
  background:#ffffff;
}

body{
  display:flex;
  align-items:center;
  justify-content:center;
}

/* SVG */

.logo{
  width:70vw;
  max-width:900px;
  height:auto;
}

/* tablet */

@media (max-width:900px){
  .logo{
    width:85vw;
  }
}

/* smartphone */

@media (max-width:600px){
  .logo{
    width:92vw;
  }
}

/* small smartphone */

@media (max-width:400px){
  .logo{
    width:96vw;
  }
}

</style>
</head>

<body>

<svg class="logo" viewBox="0 0 736 736" xmlns="http://www.w3.org/2000/svg">

<!-- ここに今のSVGをそのまま貼る -->

</svg>

</body>
</html>
